name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v1.0.0
  workflow_dispatch:  # Allow manual trigger
    branches:
      - main  # Only allow manual trigger from main
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0). Leave empty to auto-increment.'
        required: false
        type: string

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            # Auto-increment from latest tag
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            echo "Latest tag: $LATEST_TAG"
            IFS='.' read -r VMAJOR VMINOR VPATCH <<< "${LATEST_TAG#v}"
            VPATCH=$((VPATCH + 1))
            if [ "$VPATCH" -gt 9 ]; then
              VPATCH=0
              VMINOR=$((VMINOR + 1))
              if [ "$VMINOR" -gt 9 ]; then
                VMINOR=0
                VMAJOR=$((VMAJOR + 1))
              fi
            fi
            VERSION="v${VMAJOR}.${VMINOR}.${VPATCH}"
            echo "Auto-incremented version: $VERSION"
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

            # Create and push the tag
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git tag "$VERSION"
            git push origin "$VERSION"
          fi

  download-bundled-data:
    runs-on: ubuntu-latest
    steps:
      - name: Download bundled data
        run: |
          mkdir -p assets
          curl -L -o assets/bundled_data.json "${{ secrets.EXAMPLE_DATA_URL }}"
          if [ -f assets/bundled_data.json ]; then
            echo "✅ Bundled data downloaded successfully"
          else
            echo "⚠️ Bundled data not available, creating empty placeholder"
            echo '{}' > assets/bundled_data.json
          fi

      - name: Upload bundled data
        uses: actions/upload-artifact@v4
        with:
          name: bundled-data
          path: assets/bundled_data.json
          retention-days: 1

  build-pygame-bundle:
    needs: [resolve-version, download-bundled-data]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=${{ needs.resolve-version.outputs.version }}" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip rsync

      - name: Install Python dependencies for bundling
        run: pip install requests

      - name: Download bundled data
        uses: actions/download-artifact@v4
        with:
          name: bundled-data
          path: assets/

      - name: Build pygame bundle
        run: make bundle VERSION=${{ steps.version.outputs.VERSION }}

      - name: Upload pygame bundle
        uses: actions/upload-artifact@v4
        with:
          name: pygame-bundle
          path: dist/pygame.zip
          retention-days: 30

  build-macos:
    needs: [resolve-version, download-bundled-data]
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=${{ needs.resolve-version.outputs.version }}" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pygame requests zstandard pycryptodome

      - name: Download bundled data
        uses: actions/download-artifact@v4
        with:
          name: bundled-data
          path: assets/

      - name: Build macOS app
        run: make bundle-macos VERSION=${{ steps.version.outputs.VERSION }}

      - name: Upload macOS bundle
        uses: actions/upload-artifact@v4
        with:
          name: macos-bundle
          path: dist/macos.zip
          retention-days: 30

  build-windows:
    needs: [resolve-version, download-bundled-data]
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        shell: bash
        run: echo "VERSION=${{ needs.resolve-version.outputs.version }}" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pygame requests zstandard pycryptodome

      - name: Download bundled data
        uses: actions/download-artifact@v4
        with:
          name: bundled-data
          path: assets/

      - name: Verify spec file exists
        run: |
          if (Test-Path "console_utils_win.spec") {
            Write-Host "✅ Spec file found"
            Get-Item console_utils_win.spec
          } else {
            Write-Host "❌ Spec file not found"
            Get-ChildItem -Force
            exit 1
          }

      - name: Inject build info
        run: |
          (Get-Content src/constants.py) -replace '^APP_VERSION = .*', 'APP_VERSION = "${{ steps.version.outputs.VERSION }}"' -replace '^BUILD_TARGET = .*', 'BUILD_TARGET = "windows"' | Set-Content src/constants.py

      - name: Build Windows exe
        run: |
          New-Item -ItemType Directory -Force -Path dist/windows
          New-Item -ItemType Directory -Force -Path build/windows
          python -m PyInstaller console_utils_win.spec --distpath dist/windows --workpath build/windows --noconfirm
          Compress-Archive -Path "dist/windows/Console Utilities" -DestinationPath dist/windows.zip

      - name: Upload Windows bundle
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: dist/windows.zip
          retention-days: 30

  build-android:
    needs: [resolve-version, download-bundled-data]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=${{ needs.resolve-version.outputs.version }}" >> $GITHUB_OUTPUT

      - name: Download bundled data
        uses: actions/download-artifact@v4
        with:
          name: bundled-data
          path: assets/

      - name: Inject build info
        run: |
          sed -i 's/^APP_VERSION = .*/APP_VERSION = "${{ steps.version.outputs.VERSION }}"/' src/constants.py
          sed -i 's/^BUILD_TARGET = .*/BUILD_TARGET = "android"/' src/constants.py
          # Strip 'v' prefix for buildozer (e.g. v1.2.3 -> 1.2.3)
          CLEAN_VERSION=$(echo "${{ steps.version.outputs.VERSION }}" | sed 's/^v//')
          sed -i "s/^version = .*/version = ${CLEAN_VERSION}/" buildozer.spec
          # Generate numeric version code from version (1.2.3 -> 10203)
          NUMERIC_VERSION=$(echo "$CLEAN_VERSION" | awk -F. '{printf "%d%02d%02d", $1, $2, $3}')
          if grep -q '^android.numeric_version' buildozer.spec; then
            sed -i "s/^android.numeric_version = .*/android.numeric_version = ${NUMERIC_VERSION}/" buildozer.spec
          else
            sed -i "/^version = /a android.numeric_version = ${NUMERIC_VERSION}" buildozer.spec
          fi

      - name: Disable buildx alias
        run: docker buildx rm default 2>/dev/null || true

      - name: Build Android APK via Docker
        env:
          DOCKER_BUILDKIT: "0"
        run: |
          KS_PASS=$(echo -n "${{ secrets.KEYSTORE_PASSWORD }}" | tr -d '\n')
          docker build --build-arg "KEYSTORE_PASSWORD=${KS_PASS}" -t rom-builder -f docker/dockerfile.android .
          docker create --name rom-build rom-builder
          mkdir -p dist/android
          docker cp rom-build:/dist/. ./dist/android/
          docker rm rom-build

      - name: Rename APK for release
        run: |
          APK=$(find dist/android -name '*.apk' | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" dist/consoleutils.apk
            echo "✅ APK ready: dist/consoleutils.apk"
          else
            echo "❌ No APK found in dist/android/"
            exit 1
          fi

      - name: Upload Android bundle
        uses: actions/upload-artifact@v4
        with:
          name: android-bundle
          path: dist/consoleutils.apk
          retention-days: 30

  release:
    needs: [resolve-version, build-pygame-bundle, build-macos, build-windows, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download pygame bundle
        uses: actions/download-artifact@v4
        with:
          name: pygame-bundle
          path: dist/

      - name: Download macOS bundle
        uses: actions/download-artifact@v4
        with:
          name: macos-bundle
          path: dist/

      - name: Download Windows bundle
        uses: actions/download-artifact@v4
        with:
          name: windows-bundle
          path: dist/

      - name: Download Android bundle
        uses: actions/download-artifact@v4
        with:
          name: android-bundle
          path: dist/

      - name: Get version
        id: version
        run: echo "VERSION=${{ needs.resolve-version.outputs.version }}" >> $GITHUB_OUTPUT

      - name: Generate release notes with AI
        id: ai_notes
        run: |
          # Get commits since the previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | head -2 | tail -1)
          CURRENT_TAG=${{ steps.version.outputs.VERSION }}

          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$CURRENT_TAG" ]; then
            COMMITS=$(git log "$PREV_TAG".."$CURRENT_TAG" --pretty=format:"- %s" --no-merges 2>/dev/null || git log --pretty=format:"- %s" --no-merges -20)
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges -20)
          fi

          echo "Commits since $PREV_TAG:"
          echo "$COMMITS"

          # Call OpenRouter API to generate changelog
          RESPONSE=$(curl -s -X POST "https://openrouter.ai/api/v1/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.OPENROUTER_API_KEY }}" \
            -d "$(jq -n \
              --arg commits "$COMMITS" \
              --arg version "$CURRENT_TAG" \
              '{
                "model": "minimax/minimax-m1",
                "messages": [
                  {
                    "role": "user",
                    "content": ("Generate concise release notes for " + $version + " of Console Utilities (a PyGame app for handheld gaming consoles). Group changes by category (New Features, Improvements, Bug Fixes). Use markdown with emoji prefixes. Be brief — one line per change, no fluff. Only include what the commits describe, do not invent features. Ignore commits that only change CI/CD pipelines, GitHub Actions workflows, README, docs, CLAUDE.md, .md files, or other non-functional changes — only include user-facing changes.\n\nCommits:\n" + $commits)
                  }
                ],
                "max_tokens": 1024
              }')")

          # Extract the AI response
          AI_NOTES=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')

          if [ -z "$AI_NOTES" ]; then
            echo "⚠️ AI generation failed, using commit list as fallback"
            AI_NOTES=$(printf "### Changes\n\n%s" "$COMMITS")
          fi

          # Set as step output (multiline-safe via delimiter)
          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "notes<<${EOF_MARKER}" >> $GITHUB_OUTPUT
          echo "$AI_NOTES" >> $GITHUB_OUTPUT
          echo "${EOF_MARKER}" >> $GITHUB_OUTPUT

          echo "Generated release notes:"
          echo "$AI_NOTES"
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Console Utilities ${{ steps.version.outputs.VERSION }}
          body: |
            ## Console Utilities ${{ steps.version.outputs.VERSION }}

            ${{ steps.ai_notes.outputs.notes || '' }}

            ### Downloads

            | Platform | File | Description |
            |----------|------|-------------|
            | 🎮 Pygame | `pygame.zip` | For systems with pygame installed |
            | 🍎 macOS | `macos.zip` | Standalone .app bundle |
            | 🪟 Windows | `windows.zip` | Standalone .exe bundle |
            | 🤖 Android | `consoleutils.apk` | APK for Android devices |

            ### Pygame Bundle Installation
            1. Download `pygame.zip`
            2. Extract and run `./install_req.sh` to install dependencies
            3. Run: `python3 console_utils.pygame`

            ### macOS Installation
            1. Download `macos.zip`
            2. Extract and drag `Console Utilities.app` to Applications
            3. Double-click to run

            ### Windows Installation
            1. Download `windows.zip`
            2. Extract the folder
            3. Run `Console Utilities.exe`

            ### Android Installation
            1. Download `consoleutils.apk`
            2. Install the APK
            3. Enable "Install from unknown sources" if needed

            ### Requirements (Pygame bundle only)
            - Python 3.9+
            - pygame (pre-installed)
            - zstandard, pycryptodome (installed by install_req.sh)
          files: |
            dist/pygame.zip
            dist/macos.zip
            dist/windows.zip
            dist/consoleutils.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old releases (keep last 2)
        run: |
          gh release list --json tagName --limit 100 -q '.[].tagName' | tail -n +3 | while read tag; do
            echo "Deleting release: $tag"
            gh release delete "$tag" --yes
            git push --delete origin "$tag" 2>/dev/null || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
