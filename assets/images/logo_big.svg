<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#001400"/>

  <!-- CRT Monitor (centered, large) -->
  <g transform="translate(106, 40)">
    <!-- Monitor body -->
    <rect x="0" y="0" width="300" height="220" rx="16" fill="#0a1a0a" stroke="#00FF41" stroke-width="3.5" filter="url(#glow)"/>
    <!-- Screen -->
    <rect x="18" y="16" width="264" height="180" rx="8" fill="#001E00" stroke="#00B42D" stroke-width="2"/>
    <!-- Scanlines -->
    <g opacity="0.12">
      <line x1="22" y1="26" x2="278" y2="26" stroke="#00FF41" stroke-width="0.7"/>
      <line x1="22" y1="34" x2="278" y2="34" stroke="#00FF41" stroke-width="0.7"/>
      <line x1="22" y1="42" x2="278" y2="42" stroke="#00FF41" stroke-width="0.7"/>
      <line x1="22" y1="50" x2="278" y2="50" stroke="#00FF41" stroke-width="0.7"/>
      <line x1="22" y1="58" x2="278" y2="58" stroke="#00FF41" stroke-width="0.7"/>
      <line x1="22" y1="66" x2="278" y2="66" stroke="#00FF41" stroke-width="0.7"/>
      <line x1="22" y1="74" x2="278" y2="74" stroke="#00FF41" stroke-width="0.7"/>
      <line x1="22" y1="82" x2="278" y2="82" stroke="#00FF41" stroke-width="0.7"/>
      <line x1="22" y1="90" x2="278" y2="90" stroke="#00FF41" stroke-width="0.7"/>
      <line x1="22" y1="98" x2="278" y2="98" stroke="#00FF41" stroke-width="0.7"/>
      <line x1="22" y1="106" x2="278" y2="106" stroke="#00FF41" stroke-width="0.7"/>
      <line x1="22" y1="114" x2="278" y2="114" stroke="#00FF41" stroke-width="0.7"/>
      <line x1="22" y1="122" x2="278" y2="122" stroke="#00FF41" stroke-width="0.7"/>
      <line x1="22" y1="130" x2="278" y2="130" stroke="#00FF41" stroke-width="0.7"/>
      <line x1="22" y1="138" x2="278" y2="138" stroke="#00FF41" stroke-width="0.7"/>
      <line x1="22" y1="146" x2="278" y2="146" stroke="#00FF41" stroke-width="0.7"/>
      <line x1="22" y1="154" x2="278" y2="154" stroke="#00FF41" stroke-width="0.7"/>
      <line x1="22" y1="162" x2="278" y2="162" stroke="#00FF41" stroke-width="0.7"/>
      <line x1="22" y1="170" x2="278" y2="170" stroke="#00FF41" stroke-width="0.7"/>
      <line x1="22" y1="178" x2="278" y2="178" stroke="#00FF41" stroke-width="0.7"/>
      <line x1="22" y1="186" x2="278" y2="186" stroke="#00FF41" stroke-width="0.7"/>
    </g>
    <!-- C_U on screen -->
    <text x="150" y="120" font-family="monospace" font-size="48" font-weight="bold" fill="#00FF41" text-anchor="middle" filter="url(#glow-strong)">C_U</text>
    <!-- Power LED -->
    <circle cx="285" cy="22" r="4" fill="#00FF41" filter="url(#glow-strong)"/>
  </g>

  <!-- D-pad below monitor -->
  <g transform="translate(186, 290)" fill="#00B42D" filter="url(#glow)">
    <rect x="18" y="0" width="14" height="46" rx="3"/>
    <rect x="0" y="16" width="50" height="14" rx="3"/>
  </g>

  <!-- Action buttons -->
  <circle cx="306" cy="302" r="9" fill="none" stroke="#00FF41" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="332" cy="290" r="9" fill="none" stroke="#00FF41" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Text: CONSOLE -->
  <text x="256" y="395" font-family="monospace" font-size="56" font-weight="bold" fill="#00FF41" text-anchor="middle" filter="url(#glow-strong)">CONSOLE</text>

  <!-- Text: UTILITIES -->
  <text x="256" y="450" font-family="monospace" font-size="56" font-weight="bold" fill="#C8C800" text-anchor="middle" filter="url(#glow)">UTILITIES</text>

  <!-- Tagline -->
  <text x="256" y="485" font-family="monospace" font-size="20" fill="#00B42D" text-anchor="middle" opacity="0.6">&gt; retro gaming toolkit_</text>
</svg>
