<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background circle -->
  <circle cx="128" cy="128" r="120" fill="#001400"/>
  <circle cx="128" cy="128" r="120" fill="none" stroke="#00FF41" stroke-width="3" opacity="0.4" filter="url(#glow)"/>

  <!-- CRT Monitor body -->
  <rect x="48" y="48" width="160" height="120" rx="12" ry="12" fill="#0a1a0a" stroke="#00FF41" stroke-width="3" filter="url(#glow)"/>

  <!-- Screen inner bezel -->
  <rect x="60" y="58" width="136" height="96" rx="6" ry="6" fill="#001E00" stroke="#00B42D" stroke-width="1.5"/>

  <!-- Scanlines on screen -->
  <g opacity="0.15">
    <line x1="62" y1="66" x2="194" y2="66" stroke="#00FF41" stroke-width="0.5"/>
    <line x1="62" y1="72" x2="194" y2="72" stroke="#00FF41" stroke-width="0.5"/>
    <line x1="62" y1="78" x2="194" y2="78" stroke="#00FF41" stroke-width="0.5"/>
    <line x1="62" y1="84" x2="194" y2="84" stroke="#00FF41" stroke-width="0.5"/>
    <line x1="62" y1="90" x2="194" y2="90" stroke="#00FF41" stroke-width="0.5"/>
    <line x1="62" y1="96" x2="194" y2="96" stroke="#00FF41" stroke-width="0.5"/>
    <line x1="62" y1="102" x2="194" y2="102" stroke="#00FF41" stroke-width="0.5"/>
    <line x1="62" y1="108" x2="194" y2="108" stroke="#00FF41" stroke-width="0.5"/>
    <line x1="62" y1="114" x2="194" y2="114" stroke="#00FF41" stroke-width="0.5"/>
    <line x1="62" y1="120" x2="194" y2="120" stroke="#00FF41" stroke-width="0.5"/>
    <line x1="62" y1="126" x2="194" y2="126" stroke="#00FF41" stroke-width="0.5"/>
    <line x1="62" y1="132" x2="194" y2="132" stroke="#00FF41" stroke-width="0.5"/>
    <line x1="62" y1="138" x2="194" y2="138" stroke="#00FF41" stroke-width="0.5"/>
    <line x1="62" y1="144" x2="194" y2="144" stroke="#00FF41" stroke-width="0.5"/>
    <line x1="62" y1="150" x2="194" y2="150" stroke="#00FF41" stroke-width="0.5"/>
  </g>

  <!-- "C_U" text on screen (centered) -->
  <text x="128" y="115" font-family="monospace" font-size="36" font-weight="bold" fill="#00FF41" text-anchor="middle" filter="url(#glow-strong)">C_U</text>

  <!-- D-pad below monitor -->
  <g transform="translate(100, 186)" fill="#00B42D" filter="url(#glow)">
    <!-- Vertical bar -->
    <rect x="16" y="0" width="12" height="40" rx="2"/>
    <!-- Horizontal bar -->
    <rect x="0" y="14" width="44" height="12" rx="2"/>
  </g>

  <!-- Action buttons (A/B) -->
  <circle cx="176" cy="198" r="7" fill="none" stroke="#00FF41" stroke-width="2" filter="url(#glow)"/>
  <circle cx="196" cy="190" r="7" fill="none" stroke="#00FF41" stroke-width="2" filter="url(#glow)"/>

  <!-- Power LED -->
  <circle cx="196" cy="60" r="3" fill="#00FF41" filter="url(#glow-strong)"/>
</svg>
